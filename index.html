<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓語雲端遊戲化學習系統 - Duolingo 版</title>
    
    <!-- 圖示與樣式庫 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Firebase 設定檔 -->
    <script src="js/firebase-config.js"></script>

    <style>
        :root {
            --duo-green: #58cc02;
            --duo-green-shadow: #46a302;
            --duo-blue: #1cb0f6;
            --duo-blue-shadow: #1899d6;
            --duo-gray: #e5e7eb;
            --duo-gray-shadow: #d1d5db;
            --duo-red: #ff4b4b;
            --duo-red-shadow: #ea2b2b;
        }

        /* 3D 按鈕樣式 (Duolingo Style) */
        .btn-3d {
            border: none;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
            user-select: none;
        }
        .btn-3d-primary {
            background: var(--duo-green);
            color: white;
            box-shadow: 0 5px 0 var(--duo-green-shadow);
        }
        .btn-3d-primary:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 var(--duo-green-shadow);
        }
        .btn-3d-secondary {
            background: #ffffff;
            color: #4b5563;
            border: 2px solid #e5e7eb;
            box-shadow: 0 4px 0 #e5e7eb;
        }
        .btn-3d-secondary:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #e5e7eb;
        }

        /* 地圖頁面 */
        .map-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .unit-card {
            width: 100%;
            background: #ffffff;
            border: 2px solid #e5e7eb;
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 6px 0 #f3f4f6;
            box-sizing: border-box;
        }
        .unit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .unit-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #1f2937;
        }
        .stages-path {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .stage-btn-3d {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            background: var(--duo-blue);
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--duo-blue-shadow);
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .stage-btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--duo-blue-shadow);
        }
        .stage-btn-3d.locked {
            background: #9ca3af !important;
            box-shadow: 0 6px 0 #6b7280 !important;
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* 視圖通用 Modal */
        .custom-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .custom-modal-card {
            background: white; border-radius: 24px; padding: 24px;
            width: 85%; max-width: 380px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        /* Leaderboard Tabs */
        .tab-btn {
            flex: 1; padding: 10px; border: none; background: #f3f4f6;
            font-weight: bold; color: #6b7280; border-radius: 12px; cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: var(--duo-blue); color: white;
            box-shadow: 0 3px 0 var(--duo-blue-shadow);
        }
    </style>
</head>
<body>

    <!-- Firebase 登入視窗 -->
    <div class="modal" id="login-modal">
        <div class="modal-content" style="border-radius: 24px;">
            <h3><i class="fa-solid fa-cloud"></i> 歡迎來到韓語大冒險</h3>
            <p style="font-size: 0.9rem; color:#6b7280; margin-bottom: 15px;">優娜韓語 每天陪你一起進步</p>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button id="tab-login" style="flex:1; padding: 8px; font-weight: bold; border-bottom: 2px solid var(--duo-blue); background: none; border:none; cursor:pointer;">立即登入</button>
                <button id="tab-register" style="flex:1; padding: 8px; color: #6b7280; background: none; border:none; cursor:pointer;">新用戶註冊</button>
            </div>

            <input type="email" id="email-input" placeholder="電子信箱 (Email)" required />
            <input type="password" id="password-input" placeholder="密碼 (Password 六位數以上)" required />
            
            <div id="register-extended-fields" class="hidden">
                <input type="text" id="realname-input" placeholder="真實姓名" />
                <input type="date" id="birthday-input" placeholder="生日" />
                <input type="text" id="nickname-input" placeholder="顯示暱稱（不可修改）" required />
            </div>

            <div style="display: flex; align-items: center; justify-content: flex-start; gap: 8px; margin: 12px 0 6px 0; width: 100%;">
                <input type="checkbox" id="chk-remember-me" style="width: auto; margin: 0; cursor: pointer;" />
                <label for="chk-remember-me" style="font-size: 0.85rem; color: #4b5563; cursor: pointer; white-space: nowrap;">記住我的帳號與密碼</label>
            </div>

            <div style="margin-top: 10px;">
                <button class="btn-3d btn-3d-primary" id="btn-auth-submit" style="width: 100%; padding: 12px;">進入挑戰</button>
            </div>
        </div>
    </div>

    <!-- 鎖定關卡提示 Modal (問題 4 視覺優化) -->
    <div id="modal-locked" class="custom-modal hidden">
        <div class="custom-modal-card">
            <div style="font-size: 2.8rem; color: #f59e0b; margin-bottom: 10px;"><i class="fa-solid fa-lock"></i></div>
            <h3 style="margin: 0 0 8px 0; color: #1f2937;">關卡鎖定中</h3>
            <p style="margin: 0 0 20px 0; color: #6b7280; font-size: 0.95rem;">完成前面關卡才可以解鎖唷</p>
            <button id="btn-close-locked-modal" class="btn-3d btn-3d-primary" style="width: 100%; padding: 10px;">我知道了</button>
        </div>
    </div>

    <!-- 課前暖身詢問 Modal -->
    <div id="modal-warmup-ask" class="custom-modal hidden">
        <div class="custom-modal-card">
            <div style="font-size: 2.8rem; color: var(--duo-blue); margin-bottom: 10px;"><i class="fa-solid fa-graduation-cap"></i></div>
            <h3 style="margin: 0 0 8px 0; color: #1f2937;">課前暖身</h3>
            <p style="margin: 0 0 20px 0; color: #6b7280; font-size: 0.9rem;">進入挑戰前，要先複習單字與句型嗎？</p>
            <div style="display: flex; gap: 10px;">
                <button id="btn-warmup-yes" class="btn-3d btn-3d-primary" style="flex: 1; padding: 10px;">需要</button>
                <button id="btn-warmup-no" class="btn-3d btn-3d-secondary" style="flex: 1; padding: 10px;">不需要，直接挑戰</button>
            </div>
        </div>
    </div>

    <!-- 登出確認 Modal -->
    <div id="modal-logout-confirm" class="custom-modal hidden">
        <div class="custom-modal-card">
            <h3 style="margin: 0 0 10px 0; color: #1f2937;">確定要登出嗎？</h3>
            <p style="margin: 0 0 20px 0; color: #6b7280; font-size: 0.9rem;">登出後將返回登入畫面。</p>
            <div style="display: flex; gap: 10px;">
                <button id="btn-logout-yes" class="btn-3d" style="flex: 1; padding: 10px; background: var(--duo-red); color: white; box-shadow: 0 4px 0 var(--duo-red-shadow);">是</button>
                <button id="btn-logout-no" class="btn-3d btn-3d-secondary" style="flex: 1; padding: 10px;">否</button>
            </div>
        </div>
    </div>

    <!-- 主應用容器 -->
    <div class="container hidden" id="main-app">
        <!-- 頂部資訊列 -->
        <div class="user-meta-bar" style="display: flex; justify-content: space-between; align-items: center; padding: 12px 16px;">
            <div>
                <span id="btn-profile-trigger" style="cursor: pointer; font-weight: bold; color: #1f2937;">
                    <i class="fa-solid fa-circle-user" style="color: var(--duo-blue); font-size: 1.2rem;"></i> <span id="lbl-username">學生</span>
                </span>
                <span style="margin-left: 8px; font-weight: bold; color: #f59e0b;">🔥<span id="lbl-login-days">0</span>天</span>
            </div>
            <div style="font-weight: bold; color: #4b5563;">
                🪙 XP: <span id="lbl-xp" style="color: #10b981;">0</span> | <span id="lbl-user-level" style="color: var(--duo-blue);">1A</span>
            </div>
        </div>

        <!-- 🌟 視圖 1：學習地圖 (Map View) -->
        <div id="map-view" class="map-container">
            <!-- 程度選擇下拉選單 (支援 認識字母 ~ 6A) -->
            <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <label for="select-level-course" style="font-weight: bold; color: #4b5563;"><i class="fa-solid fa-layer-group"></i> 課程程度：</label>
                <select id="select-level-course" style="padding: 8px 12px; border-radius: 12px; border: 2px solid #e5e7eb; font-weight: bold; background: white; cursor: pointer;">
                    <option value="0A">認識字母</option>
                    <option value="1A" selected>1A 基礎級</option>
                    <option value="1B">1B 初級</option>
                    <option value="2A">2A 中初級</option>
                    <option value="2B">2B 中級</option>
                    <option value="3A">3A 中高級</option>
                    <option value="3B">3B 高級</option>
                    <option value="4A">4A 精通級</option>
                </select>
            </div>

            <!-- 動態渲染單元區塊 -->
            <div id="units-map-list" style="width: 100%; display: flex; flex-direction: column; gap: 20px;">
                <!-- 預設由 JS 動態生成單元 -->
            </div>
        </div>

        <!-- 🌟 視圖 2：個人主頁 (Profile View) -->
        <div id="profile-view" class="hidden" style="padding: 15px; max-width: 500px; margin: 0 auto;">
            <div style="margin-bottom: 15px;">
                <button id="btn-profile-back-map" class="btn-3d btn-3d-secondary" style="padding: 6px 14px; font-size: 0.85rem;">
                    <i class="fa-solid fa-arrow-left"></i> 返回地圖
                </button>
            </div>

            <div class="unit-card" style="margin-bottom: 20px;">
                <h3 style="margin-top:0; color: #1f2937;"><i class="fa-solid fa-id-card" style="color: var(--duo-blue);"></i> 個人檔案</h3>
                <p><strong>暱稱：</strong><span id="profile-nickname">學生</span></p>
                <p><strong>帳號：</strong><span id="profile-email">email@example.com</span></p>
                <p><strong>目前等級：</strong><span id="profile-level" style="color: var(--duo-blue); font-weight: bold;">1A</span> (XP: <span id="profile-xp" style="color: #10b981; font-weight: bold;">0</span>)</p>
                <p><strong>連續學習：</strong>🔥 <span id="profile-streak" style="color: #f59e0b; font-weight: bold;">0</span> 天</p>
                
                <hr style="border:0; border-top: 2px solid #f3f4f6; margin: 15px 0;">
                <button id="btn-trigger-logout" class="btn-3d" style="width: 100%; padding: 10px; background: var(--duo-red); color: white; box-shadow: 0 4px 0 var(--duo-red-shadow);">登出系統</button>
            </div>

            <!-- 排行榜 Tabs 頁籤 (好友榜 vs 總排行榜) -->
            <div class="unit-card">
                <h3 style="margin-top:0; color: #1f2937;"><i class="fa-solid fa-trophy" style="color: #f59e0b;"></i> 學習排行榜</h3>
                
                <div style="display: flex; gap: 8px; margin-bottom: 15px; background: #f3f4f6; padding: 4px; border-radius: 14px;">
                    <button class="tab-btn active" id="tab-leaderboard-friends">好友榜</button>
                    <button class="tab-btn" id="tab-leaderboard-global">同程度總榜 (1A)</button>
                </div>

                <!-- 好友榜頁面 -->
                <div id="content-rank-friends">
                    <p style="font-size: 0.85rem; color: #6b7280; text-align: center; padding: 10px 0;">
                        [好友榜] 尚未連結好友。<br>可顯示：破關數、最高連續學習天數、學習總時數。
                    </p>
                </div>

                <!-- 總排行榜頁面 -->
                <div id="content-rank-global" class="hidden">
                    <p style="font-size: 0.85rem; color: #6b7280; text-align: center; padding: 10px 0;">
                        [1A 總排行榜] 只顯示同程度學生競爭榜單。
                    </p>
                </div>
            </div>
        </div>

        <!-- 🌟 視圖 3：答題畫面 (Game View) -->
        <div id="game-view" class="hidden">
            <div style="margin-bottom: 10px;">
                <button id="btn-back-to-map" class="btn-3d btn-3d-secondary" style="padding: 6px 14px; font-size: 0.85rem;">
                    <i class="fa-solid fa-arrow-left"></i> 返回地圖
                </button>
            </div>

            <div class="header">
                <div class="top-row">
                    <span id="lbl-current-unit-title" style="font-weight:bold;">單元 1 - 階段 1</span>
                </div>
            </div>

            <div class="card-content" style="margin-top: 20px;">
                <div class="target-display" id="lbl-target-text">準備載入題目...</div>
                <div class="status-msg-container">
                    <div class="status-msg" id="lbl-status-text"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 模組進入點 -->
    <script type="module" src="./src/app.js"></script>
</body>
</html>
