<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓語雲端遊戲化學習系統 - Firebase 版</title>
    
    <!-- 圖示與樣式庫 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Firebase 設定檔 -->
    <script src="js/firebase-config.js"></script>

    <style>
        .map-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 20px 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .unit-card {
            width: 100%;
            background: #ffffff;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .unit-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 15px;
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 8px;
        }
        .stages-path {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .stage-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: #4f46e5;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #3730a3;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .stage-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #3730a3;
        }
        .stage-btn.locked {
            background: #9ca3af !important;
            box-shadow: 0 6px 0 #6b7280 !important;
            opacity: 0.7;
        }

        /* 彈窗基本通用樣式 */
        .custom-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .custom-modal-card {
            background: white; border-radius: 16px; padding: 20px;
            width: 85%; max-width: 380px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <!-- Firebase 登入視窗 -->
    <div class="modal" id="login-modal">
        <div class="modal-content">
            <h3><i class="fa-solid fa-cloud"></i> 歡迎來到韓語大冒險</h3>
            <p style="font-size: 0.9rem; color:#6b7280; margin-bottom: 15px;">優娜韓語 每天陪你一起進步</p>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button id="tab-login" style="flex:1; padding: 8px; font-weight: bold; border-bottom: 2px solid #4f46e5; background: none; border-top:none; border-left:none; border-right:none; cursor:pointer;">立即登入</button>
                <button id="tab-register" style="flex:1; padding: 8px; color: #6b7280; background: none; border:none; cursor:pointer;">新用戶註冊</button>
            </div>

            <input type="email" id="email-input" placeholder="電子信箱 (Email)" required />
            <input type="password" id="password-input" placeholder="密碼 (Password 六位數以上)" required />
            
            <div id="register-extended-fields" class="hidden">
                <input type="text" id="realname-input" placeholder="真實姓名" />
                <input type="date" id="birthday-input" placeholder="生日" />
                <input type="text" id="nickname-input" placeholder="顯示暱稱（不可修改）" required />
            </div>

            <div style="display: flex; align-items: center; justify-content: flex-start; gap: 8px; margin: 12px 0 6px 0; width: 100%;">
                <input type="checkbox" id="chk-remember-me" style="width: auto; margin: 0; cursor: pointer;" />
                <label for="chk-remember-me" style="font-size: 0.85rem; color: #4b5563; cursor: pointer; white-space: nowrap;">記住我的帳號與密碼</label>
            </div>

            <div style="margin-top: 10px;">
                <button class="base-btn btn-primary" id="btn-auth-submit" style="width: 100%;">進入挑戰</button>
            </div>
        </div>
    </div>

    <!-- 鎖定關卡提示 Modal -->
    <div id="modal-locked" class="custom-modal hidden">
        <div class="custom-modal-card">
            <div style="font-size: 2.5rem; color: #f59e0b; margin-bottom: 10px;"><i class="fa-solid fa-lock"></i></div>
            <h3 style="margin: 0 0 8px 0; color: #1f2937;">關卡鎖定中</h3>
            <p style="margin: 0 0 20px 0; color: #6b7280; font-size: 0.95rem;">完成前面關卡才可以解鎖唷</p>
            <button id="btn-close-locked-modal" class="base-btn btn-primary" style="width: 100%;">我知道了</button>
        </div>
    </div>

    <!-- 課前暖身詢問 Modal -->
    <div id="modal-warmup-ask" class="custom-modal hidden">
        <div class="custom-modal-card">
            <div style="font-size: 2.5rem; color: #4f46e5; margin-bottom: 10px;"><i class="fa-solid fa-graduation-cap"></i></div>
            <h3 style="margin: 0 0 8px 0; color: #1f2937;">課前暖身</h3>
            <p style="margin: 0 0 20px 0; color: #6b7280; font-size: 0.9rem;">進入挑戰前，要先複習單字與句型嗎？</p>
            <div style="display: flex; gap: 10px;">
                <button id="btn-warmup-yes" class="base-btn btn-primary" style="flex: 1;">需要</button>
                <button id="btn-warmup-no" class="base-btn btn-secondary" style="flex: 1;">不需要，直接挑戰</button>
            </div>
        </div>
    </div>

    <!-- 登出確認 Modal -->
    <div id="modal-logout-confirm" class="custom-modal hidden">
        <div class="custom-modal-card">
            <h3 style="margin: 0 0 10px 0; color: #1f2937;">確定要登出嗎？</h3>
            <p style="margin: 0 0 20px 0; color: #6b7280; font-size: 0.9rem;">登出後將返回登入畫面。</p>
            <div style="display: flex; gap: 10px;">
                <button id="btn-logout-yes" class="base-btn btn-danger" style="flex: 1;">是</button>
                <button id="btn-logout-no" class="base-btn btn-secondary" style="flex: 1;">否</button>
            </div>
        </div>
    </div>

    <!-- 主應用容器 -->
    <div class="container hidden" id="main-app">
        <!-- 頂部資訊列 -->
        <div class="user-meta-bar" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <!-- 問題 1：點擊名字可跳轉 Profile 視圖 -->
                <span id="btn-profile-trigger" style="cursor: pointer; text-decoration: underline; font-weight: bold;">
                    <i class="fa-solid fa-user"></i> <span id="lbl-username">學生</span>
                </span>
                <span style="margin-left: 10px;">(🔥<span id="lbl-login-days">0</span>天)</span>
            </div>
            <span>🪙 XP: <span id="lbl-xp">0</span> | <span id="lbl-user-level">1A</span></span>
        </div>

        <!-- 🌟 視圖 1：學習地圖 (Map View) -->
        <div id="map-view" class="map-container">
            <div class="unit-card">
                <div class="unit-title"><i class="fa-solid fa-map-location-dot"></i> 單元 1：有 / 沒有</div>
                <div class="stages-path">
                    <button class="stage-btn" data-unit="1" data-stage="1"><i class="fa-solid fa-star"></i> 階段 1</button>
                    <button class="stage-btn locked" data-unit="1" data-stage="2"><i class="fa-solid fa-lock"></i> 階段 2</button>
                    <button class="stage-btn locked" data-unit="1" data-stage="3"><i class="fa-solid fa-lock"></i> 階段 3</button>
                </div>
            </div>

            <div class="unit-card">
                <div class="unit-title"><i class="fa-solid fa-map-location-dot"></i> 單元 2：數量詞</div>
                <div class="stages-path">
                    <button class="stage-btn" data-unit="2" data-stage="1"><i class="fa-solid fa-star"></i> 階段 1</button>
                    <button class="stage-btn locked" data-unit="2" data-stage="2"><i class="fa-solid fa-lock"></i> 階段 2</button>
                    <button class="stage-btn locked" data-unit="2" data-stage="3"><i class="fa-solid fa-lock"></i> 階段 3</button>
                </div>
            </div>

            <div class="unit-card">
                <div class="unit-title"><i class="fa-solid fa-map-location-dot"></i> 單元 3：請給我</div>
                <div class="stages-path">
                    <button class="stage-btn" data-unit="3" data-stage="1"><i class="fa-solid fa-star"></i> 階段 1</button>
                    <button class="stage-btn locked" data-unit="3" data-stage="2"><i class="fa-solid fa-lock"></i> 階段 2</button>
                    <button class="stage-btn locked" data-unit="3" data-stage="3"><i class="fa-solid fa-lock"></i> 階段 3</button>
                </div>
            </div>
        </div>

        <!-- 🌟 視圖 2：個人主頁 (Profile View) -->
        <div id="profile-view" class="hidden" style="padding: 15px;">
            <div style="margin-bottom: 15px;">
                <button id="btn-profile-back-map" class="base-btn btn-secondary" style="padding: 4px 10px; font-size: 0.85rem;">
                    <i class="fa-solid fa-arrow-left"></i> 返回地圖
                </button>
            </div>

            <div class="unit-card" style="margin-bottom: 15px;">
                <h3 style="margin-top:0;"><i class="fa-solid fa-id-card"></i> 個人資料</h3>
                <p><strong>暱稱：</strong><span id="profile-nickname">學生</span></p>
                <p><strong>帳號：</strong><span id="profile-email">email@example.com</span></p>
                <p><strong>目前等級：</strong><span id="profile-level">1A</span> (XP: <span id="profile-xp">0</span>)</p>
                <p><strong>連續學習：</strong>🔥 <span id="profile-streak">0</span> 天</p>
                
                <hr style="border:0; border-top: 1px solid #e5e7eb; margin: 15px 0;">
                <button id="btn-trigger-logout" class="base-btn btn-danger" style="width: 100%;">登出系統</button>
            </div>

            <!-- 好友與總排行榜預留卡片 -->
            <div class="unit-card">
                <h3 style="margin-top:0;"><i class="fa-solid fa-trophy" style="color: #f59e0b;"></i> 排行榜 (1A 程度)</h3>
                <p style="font-size: 0.85rem; color: #6b7280;">[預留卡片] 於 Step 3 接通真實排行榜數據</p>
            </div>
        </div>

        <!-- 🌟 視圖 3：答題畫面 (Game View) -->
        <div id="game-view" class="hidden">
            <div style="margin-bottom: 10px;">
                <button id="btn-back-to-map" class="base-btn btn-secondary" style="padding: 4px 10px; font-size: 0.85rem;">
                    <i class="fa-solid fa-arrow-left"></i> 返回地圖
                </button>
            </div>

            <div class="header">
                <div class="top-row">
                    <span id="lbl-current-unit-title" style="font-weight:bold;">單元 1 - 階段 1</span>
                    <div class="stages-indicator">
                        <span class="stage-dot active" id="dot-s1">階段 1</span>
                        <span class="stage-dot" id="dot-s2">階段 2</span>
                        <span class="stage-dot" id="dot-s3">階段 3</span>
                    </div>
                </div>
            </div>

            <div class="card-content">
                <div class="target-display" id="lbl-target-text">準備載入題目...</div>
                <div class="status-msg-container">
                    <div class="status-msg" id="lbl-status-text"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 模組進入點 -->
    <script type="module" src="./src/app.js"></script>
</body>
</html>
