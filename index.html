<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>韓語雲端學習系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 頂部導覽列 (完整恢復上一版) -->
  <nav class="navbar border-bottom sticky-top bg-body-tertiary px-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <a class="navbar-brand fw-bold" href="#">韓語雲端學習系統</a>
      
      <div class="d-flex align-items-center gap-2">
        <!-- 程度切換選單 (8個完整級別) -->
        <select id="levelSelect" class="form-select form-select-sm" style="width: auto;">
          <option value="0A">0A 認識字母</option>
          <option value="1A">1A 基礎級</option>
          <option value="1B">1B 初級</option>
          <option value="2A">2A 初中級</option>
          <option value="2B">2B 中級</option>
          <option value="3A">3A 中高級</option>
          <option value="3B">3B 高級</option>
          <option value="4A">4A 精通級</option>
        </select>

        <!-- 個人資料 / 登入區域 -->
        <div id="userProfileArea" class="d-flex align-items-center gap-2">
          <button id="loginBtn" class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#authModal">登入 / 註冊</button>
          <div id="userInfo" class="d-none d-flex align-items-center gap-2">
            <span id="userDisplayName" class="fw-bold small"></span>
            <button id="profileModalBtn" class="btn btn-sm btn-light border" data-bs-toggle="modal" data-bs-target="#profileModal">個人資料</button>
            <button id="logoutBtn" class="btn btn-sm btn-outline-danger">登出</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主要學習內容區塊 (保持原樣不變) -->
  <main class="container my-4">
    <div id="mainContent">
      <!-- 語音模式、錄音功能與課程內容渲染區域 -->
    </div>
  </main>

  <!-- 個人資料 Modal -->
  <div class="modal fade" id="profileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">個人資料與設定</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-bold">帳號 Email</label>
            <input type="text" id="profileEmail" class="form-value form-control-plaintext" readonly>
          </div>

          <!-- 1. 介面語言選擇 (位置移至開通程度權限上方) -->
          <div class="mb-3 border-top pt-3">
            <label for="profileLanguageSelect" class="form-label fw-bold">介面語言選擇</label>
            <select id="profileLanguageSelect" class="form-select">
              <option value="zh-TW">繁體中文</option>
              <option value="ko">한국어 (韓文)</option>
              <option value="en">English</option>
            </select>
          </div>

          <!-- 2. 開通程度權限 (8個完整級別標籤) -->
          <div class="mb-3 border-top pt-3">
            <label class="form-label fw-bold mb-2">開通程度權限</label>
            <div id="userPermissionsList" class="d-flex flex-wrap gap-2">
              <span class="badge bg-secondary" id="perm0A">0A 認識字母</span>
              <span class="badge bg-secondary" id="perm1A">1A 基礎級</span>
              <span class="badge bg-secondary" id="perm1B">1B 初級</span>
              <span class="badge bg-secondary" id="perm2A">2A 初中級</span>
              <span class="badge bg-secondary" id="perm2B">2B 中級</span>
              <span class="badge bg-secondary" id="perm3A">3A 中高級</span>
              <span class="badge bg-secondary" id="perm3B">3B 高級</span>
              <span class="badge bg-secondary" id="perm4A">4A 精通級</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
          <button type="button" id="saveProfileBtn" class="btn btn-primary">儲存變更</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 登入 / 註冊 Modal -->
  <div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">會員登入 / 註冊</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <!-- Gmail 快速連動登入 -->
          <div class="d-grid mb-3">
            <button id="googleAuthBtn" class="btn btn-outline-dark d-flex align-items-center justify-content-center gap-2">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
              使用 Gmail / Google 帳號連動登入/註冊
            </button>
          </div>
          <div class="text-center text-muted my-2"><small>或使用 Email 帳號</small></div>

          <form id="authForm">
            <div class="mb-3">
              <label for="authEmail" class="form-label">Email 地址</label>
              <input type="email" class="form-control" id="authEmail" required>
            </div>
            <div class="mb-3">
              <label for="authPassword" class="form-label">密碼</label>
              <input type="password" class="form-control" id="authPassword" required>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" id="emailLoginBtn" class="btn btn-primary">Email 登入</button>
              <button type="button" id="emailSignUpBtn" class="btn btn-outline-secondary">Email 註冊</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.bundle.min.js"></script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
